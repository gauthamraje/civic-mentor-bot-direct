<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socratic Civic Mentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        header {
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 20;
        }
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background-color: #f9fafb;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .bubble {
            max-width: 85%;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            line-height: 1.25rem;
            border-radius: 1rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease-out;
        }
        .assistant-bubble {
            background: white;
            border: 1px solid #e5e7eb;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .user-bubble {
            background: #2563eb;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        footer {
            padding: 1rem;
            background: white;
            border-top: 1px solid #e5e7eb;
            z-index: 20;
        }
        .input-group {
            display: flex;
            background: #f3f4f6;
            border-radius: 9999px;
            padding: 0.5rem 1rem;
            align-items: center;
            gap: 0.5rem;
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.875rem;
        }
        button.send {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #drawer {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 30;
            display: none;
            flex-direction: column;
            justify-content: flex-end;
        }
        .drawer-sheet {
            background: white;
            border-top-left-radius: 1.5rem;
            border-top-right-radius: 1.5rem;
            max-height: 80vh;
            overflow-y: auto;
            padding: 1.5rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .loading-dots span {
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background: #3b82f6;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div style="font-weight: 600; font-size: 1.25rem; color: #111827;">Civic Mentor</div>
            <button onclick="resetSession()" style="position: absolute; top: 1rem; right: 1rem; font-size: 0.75rem; color: #2563eb; background: none; border: none; cursor: pointer;">Reset</button>
        </header>

        <main id="chat-window">
            <div class="bubble assistant-bubble">
                Hi! I am a mentor bot and I am here to help you solve any the problem you discoverd.
            </div>
        </main>

        <div id="loading" style="display: none; padding: 0.5rem 1.5rem; font-size: 0.75rem; color: #3b82f6;" class="loading-dots">
            <span></span><span style="animation-delay: 0.2s"></span><span style="animation-delay: 0.4s"></span>
            Mentor is reflecting...
        </div>

        <footer>
            <form id="chat-form" onsubmit="handleSend(event)">
                <div class="input-group">
                    <input id="user-input" type="text" placeholder="Explain the issue..." autocomplete="off">
                    <button type="submit" class="send">
                        <svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </form>
        </footer>

        <div id="drawer" onclick="toggleDrawer(false)">
            <div class="drawer-sheet" onclick="event.stopPropagation()">
                <div style="width: 40px; height: 5px; background: #e5e7eb; border-radius: 10px; margin: -0.5rem auto 1rem;"></div>
                <div id="drawer-content"></div>
            </div>
        </div>
    </div>

    <script>
        let threadId = localStorage.getItem('thread_id');
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const loading = document.getElementById('loading');
        const drawer = document.getElementById('drawer');
        const drawerContent = document.getElementById('drawer-content');

        async function initSession() {
            if (!threadId) {
                const res = await fetch('/threads', { method: 'POST' });
                const data = await res.json();
                threadId = data.thread_id;
                localStorage.setItem('thread_id', threadId);
            }
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `bubble ${role === 'user' ? 'user-bubble' : 'assistant-bubble'}`;
            
            // Clean up citation markers like 【4:0†source】
            const cleanedContent = content.replace(/【\d+:\d+†source】/g, '');
            
            div.innerHTML = marked.parse(cleanedContent);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function toggleDrawer(show, content = '') {
            drawer.style.display = show ? 'flex' : 'none';
            if (show) drawerContent.innerHTML = marked.parse(content);
        }

        function resetSession() {
            localStorage.removeItem('thread_id');
            location.reload();
        }

        async function handleSend(e) {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            loading.style.display = 'block';

            const res = await fetch(`/threads/${threadId}/messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: text })
            });
            const data = await res.json();
            pollStatus(threadId, data.run_id);
        }

        async function pollStatus(tid, rid) {
            const interval = setInterval(async () => {
                const res = await fetch(`/threads/${tid}/runs/${rid}`);
                const data = await res.json();
                if (data.status === 'completed') {
                    clearInterval(interval);
                    loading.style.display = 'none';
                    fetchLastMessage(tid);
                }
            }, 1500);
        }

        async function fetchLastMessage(tid) {
            const res = await fetch(`/threads/${tid}/messages`);
            const data = await res.json();
            const last = data.messages[data.messages.length - 1];
            if (last.role === 'assistant') {
                const parts = last.content.split('---');
                appendMessage('assistant', parts[0]);
                if (parts.length > 1) toggleDrawer(true, parts[1]);
                
                // Logging to Google Sheets
                const userMsg = data.messages[data.messages.length - 2];
                if (userMsg && userMsg.role === 'user') {
                    fetch('/log', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            thread_id: tid,
                            user_query: userMsg.content,
                            bot_response: parts[0] // Just log the conversational part
                        })
                    });
                }
            }
        }

        initSession();
    </script>
</body>
</html>
